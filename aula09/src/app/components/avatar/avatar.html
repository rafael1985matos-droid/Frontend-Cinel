@if (this.localUser$ | async; as user) {
  
  <div class="avatar-container">
    <img [src]="user?.photoURL ?? '/img/avatar.png' " alt="Imagem do avatar" class="avatar" />
    <!-- property bind, interpolação -->
    <span class="name">{{ user?.displayName }}</span>
    <!-- evento de click -->
    <button (click)="logout()">SignOut</button>
    <!-- <button (mauser)="logout()">Test</button> -->
  </div>

}
