<div class="login-card">
  <h2>SignIn</h2>
  <p>Favor SignIn o Forms</p>

  <button class="clean-button" (click)="this.signinForms.reset()">Reset Formulário</button>

  <!-- criação do formulario -->
  <form [formGroup]="this.signinForms" (ngSubmit)="onSubmit()">
    <!-- 1º campo do forms -->
    <label for="email">E-mail</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="Digite seu E-mail"
      formControlName="E-mail"
    />

    <!-- 2º campo do forms -->

    <label for="password">Password</label>
    <input
      type="password"
      name="password"
      id="password"
      formControlName="password"
      placeholder="Digite seu password mínimo de 6 máximo de 10"
    />

    <!-- nossos botões -->

    <div class="buton-group">
      <!-- o type aqui define o comportamento do botão no formulário -->
      <button type="button" class="go-back" (click)="goback()">Go Back</button>
      <!-- o type submit faz com que a tag form execute o formulario, mas faz com que
      o metodo (ngsubmit)="onSubmit() receba o nosso form" -->
      <button class="sign-in" type="submit">Signin</button>
    </div>
  </form>
</div>
